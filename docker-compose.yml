services:
  redis:
    image: redis:7
    container_name: redis_queue
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: ./worker
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: frontend_web
    ports:
      - "8080:80"
    depends_on:
      - backend
